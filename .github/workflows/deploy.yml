name: Deploy ToolHub

on:
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Project
        run: npm run build

      - name: Deploy to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_IP }}
          username: webapp  # Please update this to your actual server username
          key: ${{ secrets.DEPLOY_PRIVATE_KEY }}
          source: "public/*"
          target: "/var/www/sites/devtools/public"
          strip_components: 1
